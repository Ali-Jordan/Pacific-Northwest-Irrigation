<style>
/* ═══════════════════════════════════════════════════
   PNW IRRIGATION — COLOR OVERHAUL
   ═══════════════════════════════════════════════════ */

/* ── 1. NAV ── */
nav.fixed, header.fixed, nav[class*="fixed"], nav[class*="bg-green"] {
  background-color: #1B4332 !important;
}

/* ── 2. NAV LOGO — remove white glow, size up ── */
nav img, header img {
  filter: none !important;
  height: 52px !important;
  width: auto !important;
  max-height: 52px !important;
  object-fit: contain !important;
}

/* ── 3. NAV BUTTON — blue ── */
nav a[class*="bg-green"], header a[class*="bg-green"],
a[class*="bg-green-600"][class*="font-semibold"],
a[class*="bg-green-600"][class*="font-bold"] {
  background-color: #1565C0 !important;
  border-color: #1565C0 !important;
}
nav a[class*="bg-green"]:hover, header a[class*="bg-green"]:hover {
  background-color: #0D47A1 !important;
}

/* ── 4. HERO CTA BUTTONS — blue ── */
a[class*="bg-green-600"], button[class*="bg-green-600"] {
  background-color: #1565C0 !important;
  border-color: #1565C0 !important;
}
a[class*="bg-green-600"]:hover, button[class*="bg-green-600"]:hover {
  background-color: #0D47A1 !important;
}

/* ── 5. SERVICES SECTION BG — clean white ── */
section[class*="bg-green-50"], div[class*="bg-green-50"] {
  background-color: #F8FAFC !important;
}

/* ── 6. SERVICE CARDS — more definition ── */
div[class*="bg-white"][class*="rounded-xl"],
div[class*="bg-white"][class*="rounded-2xl"],
div[class*="bg-white"][class*="shadow"] {
  border: 1px solid #E2E8F0 !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important;
}

/* ── 7. LINKS & LABELS ── */
a[class*="text-green-600"]:not(nav a):not(footer a),
span[class*="text-green-600"], p[class*="text-green-600"] {
  color: #1565C0 !important;
}

/* ── 8. CHECK ICON BACKGROUNDS — light blue ── */
div[class*="bg-green-100"][class*="rounded"],
span[class*="bg-green-100"][class*="rounded"] {
  background-color: #DBEAFE !important;
}
div[class*="bg-green-100"] svg, span[class*="bg-green-100"] svg {
  color: #1565C0 !important; stroke: #1565C0 !important;
}

/* ── 9. YEARS BADGE ── */
div[class*="bg-green-600"][class*="absolute"],
div[class*="bg-green-700"][class*="absolute"] {
  background: linear-gradient(135deg, #1565C0, #0D47A1) !important;
}

/* ── 10. SERVICE AREA — dark navy ── */
section[class*="bg-green-900"], section[class*="bg-green-800"],
div[class*="bg-green-900"], div[class*="bg-green-800"] {
  background-color: #0D2137 !important;
}
div[class*="bg-green-800"][class*="rounded"],
div[class*="bg-green-700"][class*="rounded"] {
  background-color: rgba(255,255,255,0.07) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
}
section[class*="bg-green-900"] p[class*="text-green-400"],
div[class*="bg-green-900"] p[class*="text-green-400"] {
  color: #60A5FA !important;
}

/* ── 11. CTA BANNER — blue gradient ── */
section[class*="bg-green-500"], section[class*="bg-green-600"],
div[class*="bg-green-500"], div[class*="bg-green-600"] {
  background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%) !important;
}

/* ── 12. FOOTER LOGO BADGE ── */
.w-10.h-10.bg-green-600 span, .w-10.h-10.bg-green-600 .text-white {
  display: none !important;
}
.w-10.h-10.bg-green-600 {
  background-color: transparent !important;
  background-image: url('/pnw-irrigation/logo.png') !important;
  background-size: contain !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
  width: 120px !important;
  height: 120px !important;
  min-width: 120px !important;
  border-radius: 0 !important;
}

/* ── 13. SCROLL TO TOP BUTTON ── */
button[class*="bg-green-600"][class*="fixed"],
a[class*="bg-green-600"][class*="fixed"] {
  background-color: #1565C0 !important;
}

/* ── 14. PRELOADER BG ── */
.fixed.inset-0[class*="bg-green"] {
  background-color: #0D2137 !important;
}
</style>
<script>
(function() {
  // Also strip inline filter from nav img via JS (overrides inline style)
  function fixNavLogo() {
    var navImgs = document.querySelectorAll('nav img, header img');
    navImgs.forEach(function(img) {
      img.style.filter = 'none';
      img.style.height = '52px';
      img.style.width = 'auto';
    });
  }

  function swapPreloaderIcon() {
    document.querySelectorAll('.fixed.inset-0').forEach(function(el) {
      if (el.className && el.className.includes('bg-green') && !el.querySelector('.pnw-real-logo')) {
        var svg = el.querySelector('svg');
        if (svg) {
          var img = document.createElement('img');
          img.className = 'pnw-real-logo';
          img.src = '/pnw-irrigation/logo.png';
          img.alt = 'Pacific Northwest Irrigation';
          img.style.cssText = 'width:260px;height:auto;display:block;margin:0 auto 24px;filter:none;';
          svg.parentNode.insertBefore(img, svg);
          svg.style.display = 'none';
        }
      }
    });
  }

  var obs = new MutationObserver(function() { fixNavLogo(); swapPreloaderIcon(); });
  obs.observe(document.documentElement, {childList:true, subtree:true});
  fixNavLogo();
  swapPreloaderIcon();
  setTimeout(function(){ fixNavLogo(); swapPreloaderIcon(); }, 100);
  setTimeout(function(){ fixNavLogo(); swapPreloaderIcon(); }, 500);
})();
</script>
<!-- /PNW-LOGO-INJECTION -->
</head>
