  <!-- PNW-LOGO-INJECTION -->
<style>
  /* ── Footer: hide PNW text, show logo as background ── */
  .w-10.h-10.bg-green-600 span,
  .w-10.h-10.bg-green-600 .text-white {
    display: none !important;
  }
  .w-10.h-10.bg-green-600 {
    background-color: transparent !important;
    background-image: url('/pnw-irrigation/logo.png') !important;
    background-size: contain !important;
    background-repeat: no-repeat !important;
    background-position: center !important;
    width: 80px !important;
    height: 80px !important;
    border-radius: 0 !important;
    min-width: 80px !important;
  }
</style>
<script>
(function() {
  function swapPreloaderIcon() {
    var preloaders = document.querySelectorAll('.fixed.inset-0');
    preloaders.forEach(function(el) {
      if (el.className && el.className.includes('bg-green') && !el.querySelector('.pnw-real-logo')) {
        var svg = el.querySelector('svg');
        if (svg) {
          var img = document.createElement('img');
          img.className = 'pnw-real-logo';
          img.src = '/pnw-irrigation/logo.png';
          img.alt = 'Pacific Northwest Irrigation';
          img.style.cssText = 'width:260px;height:auto;display:block;margin:0 auto 24px;';
          svg.parentNode.insertBefore(img, svg);
          svg.style.display = 'none';
        }
      }
    });
  }
  var obs = new MutationObserver(swapPreloaderIcon);
  obs.observe(document.documentElement, {childList:true, subtree:true});
  swapPreloaderIcon();
  setTimeout(swapPreloaderIcon, 50);
  setTimeout(swapPreloaderIcon, 200);
})();
</script>
<!-- /PNW-LOGO-INJECTION -->
