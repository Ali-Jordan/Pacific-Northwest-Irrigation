<style>
/* ═══════════════════════════════════════════════════════════
   PNW IRRIGATION — Final Color + Nav Fix
   ═══════════════════════════════════════════════════════════ */

/* ── 1. NAV BACKGROUND ── */
nav.fixed, nav[class*="fixed"] {
  background-color: #1B4332 !important;
}

/* ── 2. NAV DESKTOP LOGO — fits inside 72px nav height ── */
nav .group img {
  filter: none !important;
  height: 48px !important;
  width: auto !important;
  display: block !important;
}

/* ── 3. MOBILE HAMBURGER ALIGNMENT ── */
/* Ensure the nav inner row is vertically centered */
nav > div:first-child {
  align-items: center !important;
  height: 72px !important;
}
/* Hamburger button vertically centered */
nav button.lg\:hidden {
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  height: 40px !important;
  width: 40px !important;
}

/* ── 4. MOBILE MENU — restore correct dark forest green ──
   Mobile menu: lg:hidden fixed inset-0 top-[72px] bg-green-900/98
   Our div[class*="bg-green-900"] rule was overriding this — fix it back */
nav [role="menu"],
nav div[class*="bg-green-900"],
.lg\:hidden[class*="fixed"][class*="inset-0"] {
  background-color: rgba(20, 83, 45, 0.98) !important;
  backdrop-filter: blur(16px) !important;
}
/* Mobile menu links should stay green-themed */
nav [role="menu"] a,
nav [role="menu"] button {
  color: white !important;
}
nav [role="menu"] a:hover {
  color: #86efac !important;
}

/* ── 5. NAV CTA BUTTON — blue ── */
nav a[class*="bg-green"],
header a[class*="bg-green"] {
  background-color: #1565C0 !important;
  border-color: #1565C0 !important;
}
nav a[class*="bg-green"]:hover {
  background-color: #0D47A1 !important;
}

/* ── 6. HERO BUTTONS — blue ── */
a[class*="bg-green-600"]:not(nav a):not(footer a):not([class*="fixed"]),
button[class*="bg-green-600"]:not([class*="fixed"]) {
  background-color: #1565C0 !important;
}
a[class*="bg-green-600"]:hover:not(nav a):not(footer a):not([class*="fixed"]),
button[class*="bg-green-600"]:hover:not([class*="fixed"]) {
  background-color: #0D47A1 !important;
}

/* ── 7. SECTION BACKGROUNDS ── */
section[class*="bg-green-50"], div[class*="bg-green-50"] {
  background-color: #F8FAFC !important;
}
section[class*="bg-gray-50"] {
  background-color: #F0F9F6 !important;
}

/* ── 8. SERVICE CARDS ── */
div[class*="bg-white"][class*="rounded-xl"],
div[class*="bg-white"][class*="rounded-2xl"],
div[class*="bg-white"][class*="shadow"] {
  border: 1px solid #E2E8F0 !important;
  box-shadow: 0 2px 16px rgba(0,0,0,0.05) !important;
}

/* ── 9. SECTION LABELS & LINKS — teal ── */
p[class*="text-green-600"]:not(nav *):not(footer *),
span[class*="text-green-600"]:not(nav *):not(footer *),
a[class*="text-green-600"]:not(nav a):not(footer a) {
  color: #0D7A5F !important;
}

/* ── 10. CHECK ICON CONTAINERS ── */
div[class*="bg-green-100"], span[class*="bg-green-100"] {
  background-color: #D1FAE5 !important;
}
div[class*="bg-green-100"] svg, span[class*="bg-green-100"] svg {
  color: #065F46 !important;
  stroke: #065F46 !important;
}

/* ── 11. YEARS BADGE ── */
div[class*="bg-green-600"][class*="absolute"],
div[class*="bg-green-700"][class*="absolute"] {
  background: #1B4332 !important;
}

/* ── 12. SERVICE AREA SECTION — navy, but NOT the mobile menu ── */
section[class*="bg-green-900"],
section[class*="bg-green-800"] {
  background-color: #0D2137 !important;
}
section[class*="bg-green-900"] div[class*="rounded"] {
  background-color: rgba(13,122,95,0.18) !important;
  border: 1px solid rgba(13,122,95,0.35) !important;
}
section[class*="bg-green-900"] span,
section[class*="bg-green-900"] p {
  color: #E0F2EE !important;
}
section[class*="bg-green-900"] p[class*="text-green-400"],
section[class*="bg-green-900"] span[class*="text-green-400"] {
  color: #5EEAD4 !important;
}

/* ── 13. CTA BANNER — forest to teal gradient ── */
section[class*="bg-green-500"],
section[class*="bg-green-600"] {
  background: linear-gradient(135deg, #1B4332 0%, #0D7A5F 100%) !important;
}

/* ── 14. SCROLL TO TOP ── */
button[class*="bg-green-600"][class*="fixed"] {
  background-color: #0D7A5F !important;
}

/* ── 15. PRELOADER ── */
div[class*="bg-green-900"][class*="fixed"][class*="inset-0"]:not([role="menu"]):not(nav *) {
  background-color: #0D2137 !important;
}

/* ── 16. FOOTER LOGO BADGE — must come LAST with highest specificity ── */
footer .w-10.h-10.bg-green-600 span,
footer div.w-10.h-10.bg-green-600 span {
  display: none !important;
}
footer .w-10.h-10.bg-green-600,
footer div.w-10.h-10.bg-green-600 {
  background: transparent !important;
  background-color: transparent !important;
  background-image: url('/pnw-irrigation/logo.png') !important;
  background-size: contain !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
  width: 120px !important;
  height: 120px !important;
  min-width: 120px !important;
  border-radius: 0 !important;
}
</style>
<script>
(function() {
  function fixNavLogo() {
    // Desktop logo only — inside .group
    document.querySelectorAll('nav .group img, nav a.group img').forEach(function(img) {
      img.style.filter = 'none';
      img.style.height = '48px';
      img.style.width = 'auto';
      img.style.margin = '0';
      img.style.display = 'block';
    });
  }

  function swapPreloaderIcon() {
    document.querySelectorAll('.fixed.inset-0').forEach(function(el) {
      // Skip nav, mobile menu (has role=menu or top-[72px] class), and anything inside nav
      if (el.closest('nav') || el.closest('header')) return;
      if (el.getAttribute('role') === 'menu') return;
      if (el.className.includes('top-\[72px\]') || el.className.includes('top-[72px]')) return;
      if (!el.className.includes('bg-green')) return;
      if (el.querySelector('.pnw-real-logo')) return;

      var svg = el.querySelector('svg');
      if (svg) {
        var img = document.createElement('img');
        img.className = 'pnw-real-logo';
        img.src = '/pnw-irrigation/logo.png';
        img.alt = 'Pacific Northwest Irrigation';
        img.style.cssText = 'width:240px;height:auto;display:block;margin:0 auto 24px;filter:none;';
        svg.parentNode.insertBefore(img, svg);
        svg.style.display = 'none';
      }
    });
  }

  var obs = new MutationObserver(function() {
    fixNavLogo();
    swapPreloaderIcon();
  });
  obs.observe(document.documentElement, {childList: true, subtree: true});
  fixNavLogo();
  swapPreloaderIcon();
  setTimeout(function(){ fixNavLogo(); swapPreloaderIcon(); }, 100);
  setTimeout(function(){ fixNavLogo(); swapPreloaderIcon(); }, 500);
})();
</script>
<!-- /PNW-LOGO-INJECTION -->
