<!-- PNW-LOGO-INJECTION -->

<style>
  /* Hide the water drop SVG icon in preloader */
  .preloader-icon svg,
  .preloader-text svg {
    display: none !important;
  }
  /* Hide default nav logo icon if it has SVG */
  .nav-logo-icon svg,
  .logo-icon svg {
    display: none !important;
  }
</style>
<script>
(function() {
  function injectLogo() {
    // ── Preloader: replace the SVG icon with the real logo ──
    // The preloader has a fixed green bg — find any SVG inside it
    var preloader = document.querySelector('.fixed.inset-0[class*="bg-green"]');
    if (preloader) {
      // Find the icon container (first svg or icon wrapper)
      var icons = preloader.querySelectorAll('svg');
      icons.forEach(function(icon) {
        var wrapper = icon.parentNode;
        icon.style.display = 'none';
        if (!wrapper.querySelector('.pnw-injected-logo')) {
          var img = document.createElement('img');
          img.src = '/pnw-irrigation/logo.png';
          img.alt = 'Pacific Northwest Irrigation';
          img.className = 'pnw-injected-logo';
          img.style.cssText = 'width:160px;height:auto;display:block;margin:0 auto 8px;';
          wrapper.insertBefore(img, icon);
        }
      });
    }

    // ── Nav/Footer: replace PNW badge text logo with img ──
    // Look for elements containing just the letter badge "PNW"
    document.querySelectorAll('[class*="logo"]').forEach(function(el) {
      if (el.textContent.trim() === 'PNW' || el.innerHTML.includes('PNW')) {
        if (!el.querySelector('.pnw-injected-logo')) {
          var img = document.createElement('img');
          img.src = '/pnw-irrigation/logo.png';
          img.alt = 'PNW Irrigation';
          img.className = 'pnw-injected-logo';
          img.style.cssText = 'width:36px;height:36px;object-fit:contain;display:block;';
          el.innerHTML = '';
          el.appendChild(img);
        }
      }
    });
  }

  // Run immediately and on DOM ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() {
      injectLogo();
      // Also run after React hydrates (slight delay)
      setTimeout(injectLogo, 100);
      setTimeout(injectLogo, 500);
      setTimeout(injectLogo, 1000);
    });
  } else {
    injectLogo();
    setTimeout(injectLogo, 100);
    setTimeout(injectLogo, 500);
    setTimeout(injectLogo, 1000);
  }

  // MutationObserver to catch React rendering the preloader
  var observer = new MutationObserver(function(mutations) {
    injectLogo();
  });
  observer.observe(document.body || document.documentElement, {
    childList: true, subtree: true
  });
})();
</script>

<!-- /PNW-LOGO-INJECTION -->
