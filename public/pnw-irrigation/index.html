<style>
/* ═══════════════════════════════════════════════════
   PNW IRRIGATION — COLOR OVERHAUL
   Logo palette: Blue #1565C0 + Green #2E7D32
   Strategy:
     Blue  → primary CTAs, buttons, links
     Green → nav, dark sections, nature accents
     White/slate → content section backgrounds
     Navy  → footer, dark panels
   ═══════════════════════════════════════════════════ */

/* ── 1. NAV — keep forest green but deepen it ── */
nav.fixed,
header.fixed,
nav[class*="fixed"],
nav[class*="bg-green"] {
  background-color: #1B4332 !important;
}

/* ── 2. NAV BUTTON "Get Free Quote" — blue instead of green ── */
nav a[class*="bg-green"],
header a[class*="bg-green"],
a[class*="bg-green-600"][class*="font-semibold"],
a[class*="bg-green-600"][class*="font-bold"] {
  background-color: #1565C0 !important;
  border-color: #1565C0 !important;
}
nav a[class*="bg-green"]:hover,
header a[class*="bg-green"]:hover {
  background-color: #0D47A1 !important;
}

/* ── 3. HERO CTA BUTTONS ── */
/* Primary green button → blue */
a[class*="bg-green-600"],
button[class*="bg-green-600"] {
  background-color: #1565C0 !important;
  border-color: #1565C0 !important;
}
a[class*="bg-green-600"]:hover,
button[class*="bg-green-600"]:hover {
  background-color: #0D47A1 !important;
}
/* Outline button — white with blue text */
a[class*="border-white"][class*="text-white"],
button[class*="border-white"][class*="text-white"] {
  border-color: rgba(255,255,255,0.7) !important;
}

/* ── 4. SERVICES SECTION BG — mint → clean white ── */
section[class*="bg-green-50"],
div[class*="bg-green-50"] {
  background-color: #F8FAFC !important;
}

/* ── 5. SERVICE CARDS — add more definition ── */
div[class*="bg-white"][class*="rounded-xl"],
div[class*="bg-white"][class*="rounded-2xl"],
div[class*="bg-white"][class*="shadow"] {
  border: 1px solid #E2E8F0 !important;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06) !important;
}

/* ── 6. "LEARN MORE" LINKS — blue instead of green ── */
a[class*="text-green-600"]:not(nav a):not(footer a),
span[class*="text-green-600"],
p[class*="text-green-600"] {
  color: #1565C0 !important;
}

/* ── 7. SECTION LABELS (small eyebrow text) — teal ── */
p[class*="text-green-600"][class*="font-semibold"],
span[class*="text-green-600"][class*="uppercase"] {
  color: #0D6E4C !important;
}

/* ── 8. CHECK ICON BACKGROUNDS — light blue instead of light green ── */
div[class*="bg-green-100"][class*="rounded"],
span[class*="bg-green-100"][class*="rounded"] {
  background-color: #DBEAFE !important;
}
div[class*="bg-green-100"] svg,
span[class*="bg-green-100"] svg {
  color: #1565C0 !important;
  stroke: #1565C0 !important;
}

/* ── 9. "15+ YEARS EXPERIENCE" BADGE — navy instead of bright green ── */
div[class*="bg-green-600"][class*="absolute"],
div[class*="bg-green-700"][class*="absolute"] {
  background: linear-gradient(135deg, #1565C0, #0D47A1) !important;
}

/* ── 10. SERVICE AREA SECTION — dark navy instead of dark forest green ── */
section[class*="bg-green-900"],
section[class*="bg-green-800"],
div[class*="bg-green-900"],
div[class*="bg-green-800"] {
  background-color: #0D2137 !important;
}
/* City name boxes in service area */
div[class*="bg-green-800"][class*="rounded"],
div[class*="bg-green-700"][class*="rounded"] {
  background-color: rgba(255,255,255,0.07) !important;
  border: 1px solid rgba(255,255,255,0.12) !important;
}
/* "Where We Work" label in this section */
section[class*="bg-green-900"] p[class*="text-green-400"],
section[class*="bg-green-900"] span[class*="text-green-400"],
div[class*="bg-green-900"] p[class*="text-green-400"] {
  color: #60A5FA !important;
}

/* ── 11. TESTIMONIALS STAR RATING color — gold stays ── */

/* ── 12. CTA BANNER (Ready for a Healthier Lawn?) — blue gradient ── */
section[class*="bg-green-500"],
section[class*="bg-green-600"],
div[class*="bg-green-500"],
div[class*="bg-green-600"] {
  background: linear-gradient(135deg, #1565C0 0%, #0D47A1 100%) !important;
}

/* ── 13. WHY US SECTION — off-white instead of pure white ── */
section[class*="bg-white"],
div[class*="bg-white"]:not([class*="rounded"]):not([class*="shadow"]) {
  background-color: #FAFAFA !important;
}

/* ── 14. FOOTER — dark navy ── */
footer[class*="bg-gray"],
footer[class*="bg-slate"],
footer[class*="bg-neutral"],
footer[class*="bg-zinc"] {
  background-color: #0A1628 !important;
}

/* ── 15. Footer logo badge — transparent ── */
.w-10.h-10.bg-green-600 span,
.w-10.h-10.bg-green-600 .text-white {
  display: none !important;
}
.w-10.h-10.bg-green-600 {
  background-color: transparent !important;
  background-image: url('/pnw-irrigation/logo.png') !important;
  background-size: contain !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
  width: 120px !important;
  height: 120px !important;
  min-width: 120px !important;
  border-radius: 0 !important;
}

/* ── 16. Scroll-to-top button ── */
button[class*="bg-green-600"][class*="fixed"],
a[class*="bg-green-600"][class*="fixed"] {
  background-color: #1565C0 !important;
}

/* ── 17. View Full Service Area button ── */
a[class*="border-white"][class*="text-white"][class*="px"] {
  border-color: rgba(255,255,255,0.5) !important;
}

/* ── 18. Preloader ── */
.fixed.inset-0[class*="bg-green"] {
  background-color: #0D2137 !important;
}
</style>
<script>
(function() {
  function swapPreloaderIcon() {
    document.querySelectorAll('.fixed.inset-0').forEach(function(el) {
      if (el.className && el.className.includes('bg-green') && !el.querySelector('.pnw-real-logo')) {
        var svg = el.querySelector('svg');
        if (svg) {
          var img = document.createElement('img');
          img.className = 'pnw-real-logo';
          img.src = '/pnw-irrigation/logo.png';
          img.alt = 'Pacific Northwest Irrigation';
          img.style.cssText = 'width:260px;height:auto;display:block;margin:0 auto 24px;';
          svg.parentNode.insertBefore(img, svg);
          svg.style.display = 'none';
        }
      }
    });
  }
  var obs = new MutationObserver(swapPreloaderIcon);
  obs.observe(document.documentElement, {childList:true, subtree:true});
  swapPreloaderIcon();
  setTimeout(swapPreloaderIcon, 50);
  setTimeout(swapPreloaderIcon, 200);
})();
</script>
